const $ = (sel) => document.querySelector(sel);
const $$ = (sel) => document.querySelectorAll(sel);

function el(tag, attrs = {}, ...children) {
  const node = document.createElement(tag);
  for (const [k, v] of Object.entries(attrs)) {
    if (k === 'class') node.className = v;
    else if (k.startsWith('on') && typeof v === 'function') node.addEventListener(k.slice(2), v);
    else node.setAttribute(k, v);
  }
  for (const child of children.flat()) {
    if (child == null || child === false) continue;
    node.appendChild(typeof child === 'string' ? document.createTextNode(child) : child);
  }
  return node;
}

function toast(message, type = 'info') {
  const colors = { info: 'bg-blue-600', success: 'bg-green-600', error: 'bg-red-600' };
  const node = el('div', {
    class: 'toast text-white px-4 py-2 rounded-lg shadow-lg ' + (colors[type] || colors.info)
  }, message);
  $('#toasts').appendChild(node);
  setTimeout(() => node.remove(), 4000);
}

function setApp(node) {
  const app = $('#app');
  app.replaceChildren(node);
}

// --- Modal genérico ---
// Uso: modal({title, body: node, onSave, saveLabel='Salvar'})
function modal({ title, body, onSave, saveLabel = 'Salvar', onClose }) {
  const overlay = el('div', {
    class: 'fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-40',
    onclick: (e) => { if (e.target === overlay) close(); }
  });

  function close() {
    overlay.remove();
    document.removeEventListener('keydown', escListener);
    if (onClose) onClose();
  }
  function escListener(e) { if (e.key === 'Escape') close(); }
  document.addEventListener('keydown', escListener);

  const card = el('div', { class: 'bg-white rounded-2xl shadow-xl w-full max-w-lg max-h-[90vh] flex flex-col' });
  const header = el('div', { class: 'px-6 py-4 border-b flex justify-between items-center' },
    el('h2', { class: 'text-lg font-semibold' }, title),
    el('button', { class: 'text-gray-400 hover:text-gray-700 text-2xl leading-none', onclick: close }, '×')
  );
  const content = el('div', { class: 'px-6 py-4 overflow-y-auto flex-1' }, body);

  const btnCancel = el('button', { type: 'button',
    class: 'px-4 py-2 rounded-lg border hover:bg-gray-50', onclick: close }, 'Cancelar');
  const btnSave = el('button', { type: 'button',
    class: 'px-4 py-2 rounded-lg bg-blue-700 hover:bg-blue-800 text-white font-semibold',
    onclick: async () => {
      btnSave.disabled = true;
      btnSave.textContent = 'Salvando...';
      try {
        const result = await onSave();
        if (result !== false) close();
      } finally {
        btnSave.disabled = false;
        btnSave.textContent = saveLabel;
      }
    }
  }, saveLabel);

  const footer = el('div', { class: 'px-6 py-4 border-t flex justify-end gap-2' }, btnCancel, btnSave);

  card.appendChild(header);
  card.appendChild(content);
  card.appendChild(footer);
  overlay.appendChild(card);
  document.body.appendChild(overlay);

  return { close };
}

// --- Confirmação destrutiva ---
function confirmDialog({ title, message, confirmLabel = 'Confirmar', danger = true, onConfirm }) {
  const body = el('p', { class: 'text-gray-700' }, message);
  modal({
    title,
    body,
    saveLabel: confirmLabel,
    onSave: async () => {
      await onConfirm();
    }
  });
}

// --- Campo de formulário (label + input/select/etc) ---
function formField({ label, input, hint }) {
  const wrap = el('div', { class: 'mb-4' });
  wrap.appendChild(el('label', { class: 'block text-sm font-medium text-gray-700 mb-1' }, label));
  wrap.appendChild(input);
  if (hint) wrap.appendChild(el('p', { class: 'text-xs text-gray-500 mt-1' }, hint));
  return wrap;
}

// --- Input texto/email/numero padrão ---
function textInput({ type = 'text', value = '', placeholder = '', required = false, step }) {
  const attrs = { type, placeholder,
    class: 'w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500' };
  if (required) attrs.required = 'required';
  if (step) attrs.step = step;
  const input = el('input', attrs);
  input.value = value;
  return input;
}

// --- Select padrão ---
function selectInput({ options, value, placeholder = 'Selecione...' }) {
  const sel = el('select', {
    class: 'w-full border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500'
  });
  sel.appendChild(el('option', { value: '' }, placeholder));
  // Comparação tolerante: o banco devolve numeric como 1.4, options podem ter '1.40' como string.
  const valStr = value == null ? '' : String(value);
  const valNum = valStr === '' ? null : Number(valStr);
  for (const opt of options) {
    const o = el('option', { value: opt.value }, opt.label);
    const optStr = String(opt.value);
    const optNum = optStr === '' ? null : Number(optStr);
    const matches = optStr === valStr
      || (valNum !== null && optNum !== null && !Number.isNaN(valNum) && !Number.isNaN(optNum) && valNum === optNum);
    if (matches) o.selected = true;
    sel.appendChild(o);
  }
  return sel;
}

// --- Tabela de dados ---
// Uso: dataTable({columns: [{key, label, render?}], rows, actions: [{label, onclick, class?}]})
function dataTable({ columns, rows, actions = [] }) {
  const wrap = el('div', { class: 'bg-white rounded-xl shadow overflow-hidden' });
  if (rows.length === 0) {
    wrap.appendChild(el('div', { class: 'p-8 text-center text-gray-500' }, 'Nenhum registro ainda.'));
    return wrap;
  }
  const table = el('table', { class: 'w-full' });
  const thead = el('thead', { class: 'bg-gray-50 border-b' });
  const trHead = el('tr', {});
  for (const col of columns) trHead.appendChild(el('th', { class: 'px-4 py-3 text-left text-xs font-semibold text-gray-600 uppercase' }, col.label));
  if (actions.length) trHead.appendChild(el('th', { class: 'px-4 py-3 text-right text-xs font-semibold text-gray-600 uppercase' }, 'Ações'));
  thead.appendChild(trHead);

  const tbody = el('tbody', { class: 'divide-y divide-gray-100' });
  for (const row of rows) {
    const tr = el('tr', { class: 'hover:bg-gray-50' });
    for (const col of columns) {
      const cellValue = col.render ? col.render(row) : (row[col.key] ?? '');
      const td = el('td', { class: 'px-4 py-3 text-sm text-gray-800' });
      if (cellValue instanceof Node) td.appendChild(cellValue); else td.textContent = String(cellValue);
      tr.appendChild(td);
    }
    if (actions.length) {
      const td = el('td', { class: 'px-4 py-3 text-right' });
      for (const a of actions) {
        const cls = a.class || 'text-blue-700 hover:underline';
        const lbl = typeof a.label === 'function' ? a.label(row) : a.label;
        td.appendChild(el('button', { class: 'text-sm ml-3 ' + cls, onclick: () => a.onclick(row) }, lbl));
      }
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
  table.appendChild(thead);
  table.appendChild(tbody);
  wrap.appendChild(table);
  return wrap;
}

// --- Page header padrão (título + botão de ação) ---
function pageHeader(title, actions = []) {
  const wrap = el('div', { class: 'flex justify-between items-center mb-4' });
  wrap.appendChild(el('h1', { class: 'text-2xl font-bold' }, title));
  const actWrap = el('div', { class: 'flex gap-2' });
  for (const a of actions) {
    actWrap.appendChild(el('button', {
      class: 'bg-blue-700 hover:bg-blue-800 text-white font-semibold px-4 py-2 rounded-lg',
      onclick: a.onclick
    }, a.label));
  }
  wrap.appendChild(actWrap);
  return wrap;
}

let CURRENT_USER = null;  // { id, email, nome, tipo, fornecedor_id }

async function login(email, senha) {
  const { data, error } = await supa.auth.signInWithPassword({ email, password: senha });
  if (error) throw error;
  await loadCurrentUser();
  return data.user;
}

async function logout() {
  await supa.auth.signOut();
  CURRENT_USER = null;
  navigate('#/login');
}

async function loadCurrentUser() {
  const { data: { session } } = await supa.auth.getSession();
  if (!session) { CURRENT_USER = null; return null; }
  const { data, error } = await supa.from('usuarios')
    .select('id, email, nome, tipo, fornecedor_id')
    .eq('id', session.user.id)
    .single();
  if (error) {
    console.error('Erro carregando perfil:', error);
    CURRENT_USER = null;
    return null;
  }
  CURRENT_USER = data;
  return data;
}

};

function navigate(hash) {
  if (location.hash !== hash) location.hash = hash;
  else handleRoute();
}

// Resolve rota: primeiro match exato, depois dinâmica #/ops/:id (id numérico).
function matchRoute(hash) {
  if (routes[hash]) return routes[hash];
  const m = hash.match(/^#\/ops\/(\d+)$/);
  if (m) return { render: () => screenNovaOP(Number(m[1])), roles: ['admin'] };
  return null;
}

async function handleRoute() {
  const hash = location.hash || '#/login';
  const route = matchRoute(hash);

  if (!route) { setApp(screenNotFound()); return; }
  if (route.public) { setApp(await route.render()); return; }

  if (!CURRENT_USER) await loadCurrentUser();
  if (!CURRENT_USER) { navigate('#/login'); return; }

  if (route.roles && !route.roles.includes(CURRENT_USER.tipo)) {
    setApp(screenForbidden());
    return;
  }

  setApp(await route.render());
}

function shellLayout(menuItems, contentNode) {

    el('div', { class: 'font-bold text-lg' }, 'Controle de Tapetes'),
    el('div', { class: 'flex items-center gap-3' },
      el('span', { class: 'text-sm text-gray-600' }, CURRENT_USER ? (CURRENT_USER.nome + ' (' + CURRENT_USER.tipo + ')') : ''),
      el('button', { class: 'text-sm text-red-600 hover:underline', onclick: logout }, 'Sair')
    )
  );

  const aside = el('aside', { class: 'w-56 bg-white border-r p-4 hidden md:block' });
  for (const item of menuItems) {
    aside.appendChild(el('a', {
      href: item.href,
      class: 'block py-2 px-3 rounded hover:bg-gray-100 text-gray-700'
    }, item.label));
  }

  const main = el('main', { class: 'flex-1 p-6 bg-gray-100' }, contentNode);

  root.appendChild(header);
  root.appendChild(el('div', { class: 'flex flex-1' }, aside, main));
  return root;
}

// Rótulo do fio de uma ordem de compra.
function rotuloFio(ordem) {
  if (ordem.tipo === 'algodao') return 'Algodão — ' + (ordem.cores?.nome || '?');
  return 'Poliéster — ' + (ordem.cor_poliester || '?');
}

const OCF_STATUS_LABEL = {
  pendente: 'Pendente', recebido_parcial: 'Recebido (parcial)', recebido_total: 'Recebido',
};

async function screenFornecedorOrdens() {
  const container = el('div', {});

  async function reload() {
    if (!CURRENT_USER.fornecedor_id) {
      container.replaceChildren(
        pageHeader('Minhas ordens'),
        el('div', { class: 'bg-white rounded-xl shadow p-8 text-center text-gray-500' },
          'Seu usuário não está vinculado a um fornecedor. Fale com o administrador.')
      );
      return;
    }
    const { data, error } = await supa.from('ordens_compra_fio')
      .select('id, tipo, cor_poliester, kg_pedido, kg_recebido, data_recebimento, status, ops(numero, ano), cores:cor_id(id, nome)')
      .order('id', { ascending: true });
    if (error) { toast('Erro ao carregar ordens', 'error'); console.error(error); return; }
    render(data || []);
  }

  function lote(ordem) { return ordem.ops ? `Nº ${ordem.ops.numero}/${ordem.ops.ano}` : '—'; }
  const fmtKg = (n) => (n == null ? '—' : Number(n).toFixed(3).replace('.', ',') + ' kg');

  function linhaPendente(ordem) {
    const kgInput = textInput({ type: 'number', step: '0.001', value: String(ordem.kg_pedido) });
    const dataInput = textInput({ type: 'date', value: new Date().toISOString().slice(0, 10) });
    const btn = el('button', {
      class: 'bg-blue-700 hover:bg-blue-800 text-white text-sm font-semibold rounded-lg px-3 py-2',
      onclick: async () => {
        const kg = Number(kgInput.value);
        if (!(kg > 0)) { toast('Informe o kg recebido', 'error'); return; }
        const dataRec = dataInput.value || new Date().toISOString().slice(0, 10);
        const status = kg < Number(ordem.kg_pedido) ? 'recebido_parcial' : 'recebido_total';
        btn.disabled = true;
        const { error } = await supa.from('ordens_compra_fio')
          .update({ kg_recebido: kg, data_recebimento: dataRec, status })
          .eq('id', ordem.id);
        if (error) { toast('Erro ao registrar recebimento', 'error'); console.error(error); btn.disabled = false; return; }
        toast('Recebimento registrado', 'success');
        reload();
      }
    }, 'Registrar');

    return el('div', { class: 'flex flex-wrap items-end gap-3 border-b py-3' },
      el('div', { class: 'flex-1 min-w-[160px]' },
        el('div', { class: 'text-xs text-gray-500' }, lote(ordem)),
        el('div', { class: 'font-medium text-gray-800' }, rotuloFio(ordem)),
        el('div', { class: 'text-xs text-gray-500' }, 'Pedido: ' + fmtKg(ordem.kg_pedido)),
      ),
      el('div', { class: 'w-32' }, formField({ label: 'Kg recebido', input: kgInput })),
      el('div', { class: 'w-40' }, formField({ label: 'Data', input: dataInput })),
      btn,
    );
  }

  function render(rows) {
    const pendentes = rows.filter(r => r.status === 'pendente');
    const recebidas = rows.filter(r => r.status !== 'pendente');

    const blocos = [pageHeader('Minhas ordens')];

    blocos.push(el('div', { class: 'bg-white rounded-xl shadow p-5 mb-6' },
      el('div', { class: 'font-semibold text-gray-700 mb-2' }, 'Pendentes'),
      pendentes.length === 0
        ? el('p', { class: 'text-sm text-gray-400' }, 'Nenhuma ordem pendente.')
        : el('div', {}, pendentes.map(linhaPendente)),
    ));

    blocos.push(el('div', { class: 'bg-white rounded-xl shadow p-5' },
      el('div', { class: 'font-semibold text-gray-700 mb-2' }, 'Recebidas'),
      recebidas.length === 0
        ? el('p', { class: 'text-sm text-gray-400' }, 'Nenhuma ordem recebida ainda.')
        : dataTable({
            columns: [
              { key: 'lote', label: 'Lote', render: lote },
              { key: 'fio', label: 'Fio', render: rotuloFio },
              { key: 'kg_pedido', label: 'Pedido', render: (r) => fmtKg(r.kg_pedido) },
              { key: 'kg_recebido', label: 'Recebido', render: (r) => fmtKg(r.kg_recebido) },
              { key: 'data', label: 'Data', render: (r) => new Date(r.data_recebimento + 'T00:00:00').toLocaleDateString('pt-BR') },
              { key: 'status', label: 'Status', render: (r) => OCF_STATUS_LABEL[r.status] || r.status },
            ],
            rows: recebidas,
          }),
    ));

    container.replaceChildren(...blocos);
  }

  await reload();
  return shellLayout([{ href: '#/fornecedor/ordens', label: 'Minhas ordens' }], container);
}

            { key: 'lote', label: 'Lote', render: (r) => `Nº ${r.numero}/${r.ano}` },
            { key: 'status', label: 'Status', render: (r) => badgeStatus(r.status) },
            { key: 'itens', label: 'Itens', render: (r) => String((r.op_itens || []).length) },
            { key: 'criado_em', label: 'Criada em', render: (r) => new Date(r.criado_em).toLocaleDateString('pt-BR') },
          ],
          rows,
          actions: [
            { label: (r) => r.status === 'simulada' ? 'Editar' : 'Ver', onclick: (r) => navigate('#/ops/' + r.id) },
          ]
        });
    container.replaceChildren(header, body);
  }

  await reload();
  return shellLayout(ADMIN_MENU, container);
}
async function screenNovaOP(opId) {
  const container = el('div', {});

  // 1) Carrega dados de apoio
  const [modelosRes, paramsRes, fornsRes] = await Promise.all([
    supa.from('modelos').select('id, nome, largura, cor_1:cor_1_id(id,nome), cor_2:cor_2_id(id,nome)').order('nome'),
    supa.from('parametros_largura').select('*'),
    supa.from('fornecedores').select('id, nome, tipo').order('nome'),
  ]);
  if (modelosRes.error || paramsRes.error || fornsRes.error) {
    toast('Erro ao carregar dados da OP', 'error');
    console.error(modelosRes.error || paramsRes.error || fornsRes.error);
    return shellLayout(ADMIN_MENU, container);
  }
  const modelos = modelosRes.data || [];
  const modelosById = Object.fromEntries(modelos.map(m => [m.id, m]));
  const parametrosByLargura = Object.fromEntries((paramsRes.data || []).map(p => [larguraKey(p.largura), p]));
  const forns = fornsRes.data || [];
  const fornsPorTipo = (tipo) => forns.filter(f => f.tipo === tipo).map(f => ({ value: f.id, label: f.nome }));

  // 2) Estado da tela
  let op = null;                 // OP existente (modo edição/leitura)
  let itens = [];                // [{ modeloId, metros }]
  let fornSel = { fio_algodao: '', fio_poliester: '', cima: '' };
  let opItensRaw = [];
  let ordens = [];
  let numero = '', ano = new Date().getFullYear();
  let readOnly = false;
  let saving = false;

  if (opId) {
    const { data, error } = await supa.from('ops')
      .select('id, numero, ano, status, op_itens(id, modelo_id, metros_pedidos, metros_ajustados), op_fornecedores(fornecedor_id, etapa)')
      .eq('id', opId).single();
    if (error || !data) {
      toast('OP não encontrada', 'error'); console.error(error);
      container.replaceChildren(pageHeader('OP não encontrada', [{ label: '← Voltar', onclick: () => navigate('#/ops') }]));
      return shellLayout(ADMIN_MENU, container);
    }
    op = data;
    numero = data.numero; ano = data.ano;
    itens = (data.op_itens || []).map(i => ({ modeloId: i.modelo_id, metros: i.metros_pedidos }));
    for (const f of (data.op_fornecedores || [])) fornSel[f.etapa] = f.fornecedor_id;
    readOnly = data.status !== 'simulada';
    opItensRaw = data.op_itens || [];
    if (op.status !== 'simulada') {
      const ordRes = await supa.from('ordens_compra_fio')
        .select('id, tipo, cor_id, cor_poliester, kg_pedido, kg_recebido, status, cores:cor_id(id, nome)')
        .eq('op_id', op.id);
      if (ordRes.error) { toast('Erro ao carregar ordens de fio', 'error'); console.error(ordRes.error); }
      ordens = ordRes.data || [];
    }
  } else {
    const { data } = await supa.from('ops').select('numero').eq('ano', ano).order('numero', { ascending: false }).limit(1);
    numero = (data && data[0] ? data[0].numero : 0) + 1;
  }

  // 3) Validação e persistência
  function itensValidos() {
    return itens.filter(i => i.modeloId && Number(i.metros) > 0);
  }

  // Persiste ops + filhos. status: 'simulada' | 'aberta'. Retorna id da OP ou null.
  async function persistir(status) {
    const numeroInt = parseInt(numero, 10), anoInt = parseInt(ano, 10);
    if (!numeroInt || !anoInt) { toast('Número e ano são obrigatórios', 'error'); return null; }
    const validos = itensValidos();
    if (validos.length === 0) { toast('Adicione ao menos 1 item com metros', 'error'); return null; }

    if (status === 'aberta') {
      const faltam = ['fio_algodao', 'fio_poliester', 'cima'].filter(e => !fornSel[e]);
      if (faltam.length) { toast('Escolha os 3 fornecedores antes de abrir a OP', 'error'); return null; }
    }

    // 1) upsert ops
    let opRow;
    if (op) {
      const r = await supa.from('ops').update({ numero: numeroInt, ano: anoInt, status }).eq('id', op.id).select().single();
      if (r.error) { erroSalvar(r.error); return null; }
      opRow = r.data;
    } else {
      const r = await supa.from('ops').insert({ numero: numeroInt, ano: anoInt, status }).select().single();
      if (r.error) { erroSalvar(r.error); return null; }
      opRow = r.data;
    }
    const opIdSalvo = opRow.id;

    // 2) substitui op_itens
    await supa.from('op_itens').delete().eq('op_id', opIdSalvo);
    const itensPayload = validos.map(i => ({ op_id: opIdSalvo, modelo_id: i.modeloId, metros_pedidos: Number(i.metros) }));
    const itensRes = await supa.from('op_itens').insert(itensPayload);
    if (itensRes.error) {
      if (status === 'aberta') await supa.from('ops').update({ status: 'simulada' }).eq('id', opIdSalvo);
      toast('Erro ao salvar itens', 'error'); console.error(itensRes.error); return null;
    }

    // 3) substitui op_fornecedores (apenas etapas escolhidas)
    await supa.from('op_fornecedores').delete().eq('op_id', opIdSalvo);
    const fornPayload = ['fio_algodao', 'fio_poliester', 'cima']
      .filter(e => fornSel[e])
      .map(e => ({ op_id: opIdSalvo, fornecedor_id: fornSel[e], etapa: e }));
    if (fornPayload.length) {
      const fornRes = await supa.from('op_fornecedores').insert(fornPayload);
      if (fornRes.error) {
        if (status === 'aberta') await supa.from('ops').update({ status: 'simulada' }).eq('id', opIdSalvo);
        toast('Erro ao salvar fornecedores', 'error'); console.error(fornRes.error); return null;
      }
    }

    // 4) se abrir: gera ordens_compra_fio (com rollback de status em caso de falha)
    if (status === 'aberta') {
      const calc = calcularFiosOP(validos, modelosById, parametrosByLargura);
      const ordens = montarOrdensCompraFio(calc).map(o => ({
        op_id: opIdSalvo,
        fornecedor_id: o.tipo === 'algodao' ? fornSel.fio_algodao : fornSel.fio_poliester,
        tipo: o.tipo, cor_id: o.cor_id, cor_poliester: o.cor_poliester,
        kg_pedido: o.kg_pedido, status: 'pendente',
      }));
      await supa.from('ordens_compra_fio').delete().eq('op_id', opIdSalvo);
      const ordRes = await supa.from('ordens_compra_fio').insert(ordens);
      if (ordRes.error) {
        await supa.from('ops').update({ status: 'simulada' }).eq('id', opIdSalvo);
        toast('Falha ao gerar ordens de compra — OP mantida como simulada', 'error');
        console.error(ordRes.error);
        return null;
      }
    }

    return opIdSalvo;
  }

  function erroSalvar(error) {
    if (error.code === '23505' || (error.message && error.message.includes('duplicate'))) toast(`Já existe OP nº ${numero} em ${ano}`, 'error');
    else toast('Erro ao salvar OP', 'error');
    console.error(error);
  }

  async function salvarSimulacao() {
    if (saving) return;
    saving = true;
    try {
      const id = await persistir('simulada');
      if (id) { toast('Simulação salva', 'success'); navigate('#/ops'); }
    } finally { saving = false; }
  }
  async function abrirOP() {
    if (saving) return;
    saving = true;
    try {
      const id = await persistir('aberta');
      if (id) { toast('OP aberta — ordens de compra geradas', 'success'); navigate('#/ops'); }
    } finally { saving = false; }
  }

  // 4) Render
  function render() {
    container.replaceChildren(buildScreen());
  }

  function buildScreen() {
    const titulo = op ? `OP Nº ${op.numero}/${op.ano}` + (readOnly ? ' (leitura)' : ' (editar)') : 'Nova OP';
    const wrap = el('div', {});
    wrap.appendChild(pageHeader(titulo, [{ label: '← Voltar', onclick: () => navigate('#/ops') }]));

    const grid = el('div', { class: 'flex flex-col lg:flex-row gap-6' });
    grid.appendChild(buildLeft());
    grid.appendChild(buildRight());
    wrap.appendChild(grid);
    if (op && op.status !== 'simulada') wrap.appendChild(buildBlocoFios());
    return wrap;
  }

  function disabledAttr(node) { if (readOnly) node.setAttribute('disabled', 'disabled'); return node; }

  function buildLeft() {
    const left = el('div', { class: 'flex-1 bg-white rounded-xl shadow p-5' });

    const numInput = disabledAttr(textInput({ type: 'number', value: String(numero) }));
    const anoInput = disabledAttr(textInput({ type: 'number', value: String(ano) }));
    numInput.addEventListener('input', () => { numero = numInput.value; });
    anoInput.addEventListener('input', () => { ano = anoInput.value; });
    const lote = el('div', { class: 'flex gap-3' },
      el('div', { class: 'w-28' }, formField({ label: 'Número', input: numInput })),
      el('div', { class: 'w-28' }, formField({ label: 'Ano', input: anoInput })),
    );
    left.appendChild(lote);

    left.appendChild(el('div', { class: 'font-semibold text-gray-700 mt-2 mb-2' }, 'Itens (modelo × metros)'));
    const itensWrap = el('div', {});
    const modeloOptions = modelos.map(m => ({
      value: m.id,
      label: `${m.nome} ${larguraKey(m.largura)}m · ${m.cor_1?.nome}/${m.cor_2?.nome}`,
    }));
    itens.forEach((item, idx) => itensWrap.appendChild(buildItemRow(item, idx, modeloOptions)));
    left.appendChild(itensWrap);

    if (!readOnly) {
      left.appendChild(el('button', {
        class: 'mt-2 text-sm text-blue-700 hover:underline',
        onclick: () => { itens.push({ modeloId: '', metros: '' }); render(); }
      }, '+ adicionar item'));
    }

    left.appendChild(el('div', { class: 'font-semibold text-gray-700 mt-5 mb-2' }, 'Fornecedores'));
    left.appendChild(buildFornField('Algodão', 'fio_algodao'));
    left.appendChild(buildFornField('Poliéster', 'fio_poliester'));
    left.appendChild(buildFornField('Tecelagem (parte de cima)', 'cima'));

    return left;
  }

  function buildItemRow(item, idx, modeloOptions) {
    const modeloSel = disabledAttr(selectInput({ options: modeloOptions, value: item.modeloId, placeholder: 'Modelo...' }));
    const metrosInput = disabledAttr(textInput({ type: 'number', value: item.metros === '' ? '' : String(item.metros), placeholder: 'metros' }));
    modeloSel.addEventListener('change', () => { item.modeloId = modeloSel.value ? Number(modeloSel.value) : ''; renderRight(); });
    metrosInput.addEventListener('input', () => { item.metros = metrosInput.value === '' ? '' : Number(metrosInput.value); renderRight(); });

    const row = el('div', { class: 'flex gap-2 items-center mb-2' },
      el('div', { class: 'flex-1' }, modeloSel),
      el('div', { class: 'w-24' }, metrosInput),
    );
    if (!readOnly) {
      row.appendChild(el('button', { class: 'text-red-600 hover:underline text-sm', onclick: () => { itens.splice(idx, 1); render(); } }, '✕'));
    }
    return row;
  }

  function buildFornField(label, etapa) {
    const fornsTipo = etapa === 'cima' ? fornsPorTipo('tecelagem') : fornsPorTipo(etapa);
    const sel = disabledAttr(selectInput({ options: fornsTipo, value: fornSel[etapa], placeholder: 'Selecione...' }));
    sel.addEventListener('change', () => { fornSel[etapa] = sel.value ? Number(sel.value) : ''; renderRight(); });
    return formField({ label, input: sel });
  }

  function fmtKg(n) { return (n == null ? '—' : Number(n).toFixed(3).replace('.', ',') + ' kg'); }
  function fmtMetros(n) { return Number(n).toFixed(2).replace('.', ',') + ' m'; }
  function rotuloFioOrdem(o) {
    return o.tipo === 'algodao' ? 'Algodão — ' + (o.cores?.nome || '?') : 'Poliéster — ' + (o.cor_poliester || '?');
  }

  function buildBlocoFios() {
    const box = el('div', { class: 'bg-white rounded-xl shadow p-5 mt-6' });
    box.appendChild(el('div', { class: 'font-semibold text-gray-700 mb-3' }, 'Recebimento de fios'));

    box.appendChild(dataTable({
      columns: [
        { key: 'fio', label: 'Fio', render: rotuloFioOrdem },
        { key: 'kg_pedido', label: 'Pedido', render: (o) => fmtKg(o.kg_pedido) },
        { key: 'kg_recebido', label: 'Recebido', render: (o) => o.kg_recebido == null ? 'aguardando' : fmtKg(o.kg_recebido) },
        { key: 'status', label: 'Status', render: (o) => OCF_STATUS_LABEL[o.status] || o.status },
      ],
      rows: ordens,
    }));

    const todasRecebidas = ordens.length > 0 && ordens.every(o => o.kg_recebido != null);

    if (op.status === 'aberta') {
      if (!todasRecebidas) {
        const faltam = ordens.filter(o => o.kg_recebido == null).length;
        box.appendChild(el('p', { class: 'text-sm text-amber-700 mt-3' },
          `Aguardando recebimento de ${faltam} fio(s) para calcular a proposta de ajuste.`));
        return box;
      }
      box.appendChild(buildProposta());
    } else {
      box.appendChild(el('div', { class: 'font-semibold text-gray-700 mt-4 mb-2' }, 'Metros de produção'));
      box.appendChild(dataTable({
        columns: [
          { key: 'modelo', label: 'Modelo', render: (i) => modelosById[i.modelo_id]?.nome || ('#' + i.modelo_id) },
          { key: 'metros_pedidos', label: 'Pedido', render: (i) => fmtMetros(i.metros_pedidos) },
          { key: 'metros_ajustados', label: 'Produção', render: (i) => i.metros_ajustados == null ? fmtMetros(i.metros_pedidos) : fmtMetros(i.metros_ajustados) },
        ],
        rows: opItensRaw,
      }));
    }
    return box;
  }

  function buildProposta() {
    const itensCalc = opItensRaw.map(i => ({ op_item_id: i.id, modelo_id: i.modelo_id, metros_pedidos: Number(i.metros_pedidos) }));
    const resultado = recalcularOP(itensCalc, ordens);
    const wrap = el('div', { class: 'mt-4' });

    const semFio = ordens.some(o => Number(o.kg_recebido) <= 0);
    if (semFio) wrap.appendChild(el('p', { class: 'text-sm text-red-600 mb-2' }, 'Atenção: alguma ordem foi recebida com 0 kg.'));

    wrap.appendChild(el('p', { class: 'text-sm text-gray-700 mb-2' },
      'Fator de produção (cor mais escassa): ', el('b', {}, resultado.fator.toFixed(2).replace('.', ','))));

    wrap.appendChild(dataTable({
      columns: [
        { key: 'modelo', label: 'Modelo', render: (it) => modelosById[itensCalc.find(c => c.op_item_id === it.op_item_id).modelo_id]?.nome || '?' },
        { key: 'metros_pedidos', label: 'Pedido', render: (it) => fmtMetros(it.metros_pedidos) },
        { key: 'metros_ajustados', label: 'Proposto', render: (it) => fmtMetros(it.metros_ajustados) },
      ],
      rows: resultado.itens,
    }));

    if (resultado.sobras.length) {
      wrap.appendChild(el('div', { class: 'text-xs uppercase text-gray-500 mt-3 mb-1' }, 'Sobra de fio (vira saldo)'));
      for (const s of resultado.sobras) {
        const nome = s.tipo === 'algodao'
          ? 'Algodão — ' + (ordens.find(o => o.id === s.ordem_id)?.cores?.nome || '?')
          : 'Poliéster — ' + s.cor_poliester;
        wrap.appendChild(el('p', { class: 'text-sm mb-1' }, `${nome}: `, el('b', {}, fmtKg(s.kg_sobra))));
      }
    }

    const btnAceitar = el('button', {
      class: 'bg-blue-700 hover:bg-blue-800 text-white font-semibold rounded-lg px-4 py-2 mt-4 mr-2',
      onclick: () => aplicarRecalculo(resultado, 'aceitar'),
    }, 'Aceitar proposta');
    const btnManter = el('button', {
      class: 'bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold rounded-lg px-4 py-2 mt-4',
      onclick: () => aplicarRecalculo(resultado, 'manter'),
    }, 'Manter pedido');
    wrap.appendChild(el('div', {}, btnAceitar, btnManter));
    return wrap;
  }

  let rightNode = null;
  function buildRight() {
    rightNode = el('div', { class: 'lg:w-80 bg-gray-50 rounded-xl shadow p-5 self-start' });
    renderRightInto();
    return rightNode;
  }
  function renderRight() { if (rightNode) renderRightInto(); }

  function renderRightInto() {
    let calc;
    try {
      calc = calcularFiosOP(itens, modelosById, parametrosByLargura);
    } catch (err) {
      rightNode.replaceChildren(el('p', { class: 'text-red-600 text-sm' }, err.message));
      return;
    }
    const fmt = (n) => Number(n).toFixed(3).replace('.', ',') + ' kg';
    const children = [el('div', { class: 'font-semibold text-gray-700 mb-3' }, 'Fio necessário')];

    const algEntries = Object.values(calc.algodaoPorCor);
    children.push(el('div', { class: 'text-xs uppercase text-gray-500 mb-1' }, 'Algodão'));
    if (algEntries.length === 0) children.push(el('p', { class: 'text-sm text-gray-400 mb-2' }, '—'));
    for (const a of algEntries) children.push(el('p', { class: 'text-sm mb-1' }, `${a.corNome}: `, el('b', {}, fmt(a.kg))));

    children.push(el('div', { class: 'text-xs uppercase text-gray-500 mt-3 mb-1' }, 'Poliéster'));
    children.push(el('p', { class: 'text-sm mb-1' }, 'PRETO: ', el('b', {}, fmt(calc.poliester.PRETO))));
    children.push(el('p', { class: 'text-sm mb-1' }, 'BRANCO: ', el('b', {}, fmt(calc.poliester.BRANCO))));

    if (!readOnly) {
      const faltamForn = ['fio_algodao', 'fio_poliester', 'cima'].filter(e => !fornSel[e]);
      const btnSim = el('button', {
        class: 'w-full mt-5 mb-2 bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold rounded-lg py-2',
        onclick: salvarSimulacao,
      }, 'Salvar simulação');
      const btnAbrir = el('button', {
        class: 'w-full font-semibold rounded-lg py-2 ' + (faltamForn.length
          ? 'bg-blue-300 text-white cursor-not-allowed'
          : 'bg-blue-700 hover:bg-blue-800 text-white'),
        onclick: () => { if (!faltamForn.length) abrirOP(); },
      }, 'Abrir OP');
      if (faltamForn.length) btnAbrir.setAttribute('disabled', 'disabled');
      children.push(btnSim, btnAbrir);
      if (faltamForn.length) children.push(el('p', { class: 'text-xs text-gray-500 mt-1' }, 'Escolha os 3 fornecedores para abrir.'));
    }

    rightNode.replaceChildren(...children);
    rightNode._calc = calc;
  }

  render();
  return shellLayout(ADMIN_MENU, container);
}

async function screenCadastrosCores() {
  const container = el('div', {});

  async function reload() {
    const { data, error } = await supa.from('cores').select('*').order('nome');
    if (error) { toast('Erro ao carregar cores', 'error'); console.error(error); return; }
    render(data || []);
  }

  function render(rows) {
    container.replaceChildren(
      pageHeader('Cores', [{ label: '+ Nova cor', onclick: () => openModal(null) }]),
      dataTable({
        columns: [
          { key: 'id', label: 'ID' },
          { key: 'nome', label: 'Nome' },
        ],
        rows,
        actions: [
          { label: 'Editar', onclick: (r) => openModal(r) },
          { label: 'Excluir', class: 'text-red-600 hover:underline', onclick: (r) => confirmExcluir(r) },
        ]
      })
    );
  }

  function openModal(cor) {
    const isEdit = !!cor;
    const nomeInput = textInput({ value: cor?.nome || '', placeholder: 'Ex: VERMELHO', required: true });
    const body = el('div', {}, formField({ label: 'Nome', input: nomeInput, hint: 'Use letras maiúsculas pra padronizar' }));
    modal({
      title: isEdit ? 'Editar cor' : 'Nova cor',
      body,
      onSave: async () => {
        const nome = nomeInput.value.trim().toUpperCase();
        if (!nome) { toast('Nome é obrigatório', 'error'); return false; }
        const payload = { nome };
        const { error } = isEdit
          ? await supa.from('cores').update(payload).eq('id', cor.id)
          : await supa.from('cores').insert(payload);
        if (error) { toast(error.message.includes('duplicate') ? 'Cor já cadastrada' : 'Erro ao salvar', 'error'); console.error(error); return false; }
        toast(isEdit ? 'Cor atualizada' : 'Cor criada', 'success');
        reload();
      }
    });
  }

  function confirmExcluir(cor) {
    confirmDialog({
      title: 'Excluir cor',
      message: `Excluir "${cor.nome}"? Se algum modelo usar essa cor, a exclusão vai falhar.`,
      confirmLabel: 'Excluir',
      onConfirm: async () => {
        const { error } = await supa.from('cores').delete().eq('id', cor.id);
        if (error) { toast('Cor está em uso (não dá pra excluir)', 'error'); console.error(error); return; }
        toast('Cor excluída', 'success');
        reload();
      }
    });
  }

  await reload();
  return shellLayout(ADMIN_MENU, container);
}

async function screenCadastrosModelos() {
  const container = el('div', {});

  async function reload() {
    const [modelosRes, coresRes] = await Promise.all([
      supa.from('modelos').select('id, nome, largura, cor_1:cor_1_id(id, nome), cor_2:cor_2_id(id, nome)').order('nome'),
      supa.from('cores').select('id, nome').order('nome')
    ]);
    if (modelosRes.error || coresRes.error) { toast('Erro ao carregar', 'error'); console.error(modelosRes.error || coresRes.error); return; }
    render(modelosRes.data || [], coresRes.data || []);
  }

  function render(modelos, cores) {
    container.replaceChildren(
      pageHeader('Modelos', [{ label: '+ Novo modelo', onclick: () => openModal(null, cores) }]),
      dataTable({
        columns: [
          { key: 'id', label: 'ID' },
          { key: 'nome', label: 'Nome' },
          { key: 'cor_1', label: 'Cor 1 (predominante)', render: (r) => r.cor_1?.nome || '' },
          { key: 'cor_2', label: 'Cor 2', render: (r) => r.cor_2?.nome || '' },
          { key: 'largura', label: 'Largura', render: (r) => Number(r.largura).toFixed(2).replace('.', ',') + ' m' },
        ],
        rows: modelos,
        actions: [
          { label: 'Editar', onclick: (r) => openModal(r, cores) },
          { label: 'Excluir', class: 'text-red-600 hover:underline', onclick: (r) => confirmExcluir(r) },
        ]
      })
    );
  }

  function openModal(modelo, cores) {
    const isEdit = !!modelo;
    const corOptions = cores.map(c => ({ value: c.id, label: c.nome }));
    const nomeInput = textInput({ value: modelo?.nome || '', placeholder: 'Ex: Conforto', required: true });
    const cor1Sel = selectInput({ options: corOptions, value: modelo?.cor_1?.id });
    const cor2Sel = selectInput({ options: corOptions, value: modelo?.cor_2?.id });
    const largSel = selectInput({
      options: [{ value: '1.40', label: '1,40 m' }, { value: '2.10', label: '2,10 m' }],
      value: modelo?.largura
    });
    const body = el('div', {},
      formField({ label: 'Nome do modelo', input: nomeInput }),
      formField({ label: 'Cor 1 (predominante)', input: cor1Sel, hint: 'A ordem importa: "BRANCO/PRETO" é diferente de "PRETO/BRANCO".' }),
      formField({ label: 'Cor 2', input: cor2Sel }),
      formField({ label: 'Largura', input: largSel })
    );
    modal({
      title: isEdit ? 'Editar modelo' : 'Novo modelo',
      body,
      onSave: async () => {
        const nome = nomeInput.value.trim();
        const cor_1_id = cor1Sel.value;
        const cor_2_id = cor2Sel.value;
        const largura = largSel.value;
        if (!nome || !cor_1_id || !cor_2_id || !largura) { toast('Preencha todos os campos', 'error'); return false; }
        const payload = { nome, cor_1_id, cor_2_id, largura };
        const { error } = isEdit
          ? await supa.from('modelos').update(payload).eq('id', modelo.id)
          : await supa.from('modelos').insert(payload);
        if (error) { toast(error.message.includes('duplicate') ? 'Modelo já cadastrado com essa combinação' : 'Erro ao salvar', 'error'); console.error(error); return false; }
        toast(isEdit ? 'Modelo atualizado' : 'Modelo criado', 'success');
        reload();
      }
    });
  }

  function confirmExcluir(modelo) {
    confirmDialog({
      title: 'Excluir modelo',
      message: `Excluir "${modelo.nome}"? Se algum item de OP usar esse modelo, a exclusão vai falhar.`,
      confirmLabel: 'Excluir',
      onConfirm: async () => {
        const { error } = await supa.from('modelos').delete().eq('id', modelo.id);
        if (error) { toast('Modelo está em uso (não dá pra excluir)', 'error'); console.error(error); return; }
        toast('Modelo excluído', 'success');
        reload();
      }
    });
  }

  await reload();
  return shellLayout(ADMIN_MENU, container);
}

async function screenCadastrosParametros() {
  const container = el('div', {});

  async function reload() {
    const { data, error } = await supa.from('parametros_largura').select('*').order('largura');
    if (error) { toast('Erro ao carregar parâmetros', 'error'); console.error(error); return; }
    render(data || []);
  }

  function render(rows) {
    const cards = el('div', { class: 'grid md:grid-cols-2 gap-4' });
    for (const p of rows) cards.appendChild(cardParametro(p));
    container.replaceChildren(
      pageHeader('Parâmetros de cálculo', []),
      el('p', { class: 'text-gray-600 mb-4 text-sm' }, 'Esses valores são usados no cálculo de fios ao simular uma OP. Edite com cuidado.'),
      cards
    );
  }

  function cardParametro(p) {
    const card = el('div', { class: 'bg-white rounded-xl shadow p-6' });
    card.appendChild(el('h2', { class: 'text-lg font-semibold mb-4' }, `Largura ${Number(p.largura).toFixed(2).replace('.', ',')} m`));
    const pesoInput  = textInput({ type: 'number', step: '0.0001', value: p.peso_linear });
    const algoInput  = textInput({ type: 'number', step: '0.000001', value: p.algodao_por_ml });
    const poliInput  = textInput({ type: 'number', step: '0.000001', value: p.poliester_por_ml });
    const valxInput  = textInput({ type: 'number', step: '0.0001', value: p.valor_x });
    card.appendChild(formField({ label: 'Peso linear', input: pesoInput }));
    card.appendChild(formField({ label: 'Algodão / ML', input: algoInput }));
    card.appendChild(formField({ label: 'Poliéster / ML', input: poliInput }));
    card.appendChild(formField({ label: 'Valor X', input: valxInput }));
    const btn = el('button', {
      class: 'mt-2 bg-blue-700 hover:bg-blue-800 text-white font-semibold px-4 py-2 rounded-lg',
      onclick: async () => {
        btn.disabled = true; btn.textContent = 'Salvando...';
        const payload = {
          peso_linear: pesoInput.value,
          algodao_por_ml: algoInput.value,
          poliester_por_ml: poliInput.value,
          valor_x: valxInput.value,
          atualizado_em: new Date().toISOString()
        };
        const { error } = await supa.from('parametros_largura').update(payload).eq('largura', p.largura);
        btn.disabled = false; btn.textContent = 'Salvar';
        if (error) { toast('Erro ao salvar', 'error'); console.error(error); return; }
        toast(`Parâmetros de ${p.largura}m atualizados`, 'success');
      }
    }, 'Salvar');
    card.appendChild(btn);
    return card;
  }

  await reload();
  return shellLayout(ADMIN_MENU, container);
}

const FORNECEDOR_TIPOS = [
  { value: 'fio_algodao',   label: 'Fornecedor de Algodão' },
  { value: 'fio_poliester', label: 'Fornecedor de Poliéster' },
  { value: 'tecelagem',     label: 'Tecelagem (parte de cima)' },
  { value: 'latex',         label: 'Látex (acabamento)' },
];

function labelFornecedorTipo(tipo) {
  return FORNECEDOR_TIPOS.find(t => t.value === tipo)?.label || tipo;
}

async function screenCadastrosPrecos() {
  const container = el('div', {});

  async function reload() {
    const [precosRes, fornsRes] = await Promise.all([
      supa.from('precos_terceirizada').select('id, etapa, largura, preco_por_metro, fornecedor:fornecedor_id(id, nome, tipo)').order('etapa').order('largura'),
      supa.from('fornecedores').select('id, nome, tipo').in('tipo', ['tecelagem', 'latex']).order('nome')
    ]);
    if (precosRes.error || fornsRes.error) { toast('Erro ao carregar', 'error'); console.error(precosRes.error || fornsRes.error); return; }
    render(precosRes.data || [], fornsRes.data || []);
  }

  function render(precos, forns) {
    container.replaceChildren(
      pageHeader('Preços de terceirizadas', [{ label: '+ Novo preço', onclick: () => openModal(null, forns) }]),
      el('p', { class: 'text-gray-600 mb-4 text-sm' }, 'Preço cobrado por metro produzido, por etapa (parte de cima ou látex) e largura.'),
      dataTable({
        columns: [
          { key: 'fornecedor', label: 'Fornecedor', render: (r) => r.fornecedor?.nome || '' },
          { key: 'etapa', label: 'Etapa', render: (r) => r.etapa === 'cima' ? 'Parte de cima' : 'Látex' },
          { key: 'largura', label: 'Largura', render: (r) => Number(r.largura).toFixed(2).replace('.', ',') + ' m' },
          { key: 'preco_por_metro', label: 'R$ / metro', render: (r) => 'R$ ' + Number(r.preco_por_metro).toFixed(2).replace('.', ',') },
        ],
        rows: precos,
        actions: [
          { label: 'Editar', onclick: (r) => openModal(r, forns) },
          { label: 'Excluir', class: 'text-red-600 hover:underline', onclick: (r) => confirmExcluir(r) },
        ]
      })
    );
  }

  function openModal(preco, forns) {
    const isEdit = !!preco;
    const fornOptions = forns.map(f => ({ value: f.id, label: `${f.nome} (${f.tipo === 'tecelagem' ? 'tecelagem' : 'látex'})` }));
    const etapaOptions = [{ value: 'cima', label: 'Parte de cima' }, { value: 'latex', label: 'Látex' }];
    const largOptions = [{ value: '1.40', label: '1,40 m' }, { value: '2.10', label: '2,10 m' }];

    const fornSel = selectInput({ options: fornOptions, value: preco?.fornecedor?.id });
    const etapaSel = selectInput({ options: etapaOptions, value: preco?.etapa });
    const largSel = selectInput({ options: largOptions, value: preco?.largura });
    const precoInput = textInput({ type: 'number', step: '0.01', value: preco?.preco_por_metro || '', placeholder: '0,00' });

    const body = el('div', {},
      formField({ label: 'Fornecedor', input: fornSel }),
      formField({ label: 'Etapa', input: etapaSel }),
      formField({ label: 'Largura', input: largSel }),
      formField({ label: 'Preço por metro (R$)', input: precoInput })
    );

    modal({
      title: isEdit ? 'Editar preço' : 'Novo preço',
      body,
      onSave: async () => {
        const fornecedor_id = fornSel.value;
        const etapa = etapaSel.value;
        const largura = largSel.value;
        const preco_por_metro = parseFloat(precoInput.value);
        if (!fornecedor_id || !etapa || !largura || isNaN(preco_por_metro) || preco_por_metro < 0) {
          toast('Preencha todos os campos com valores válidos', 'error'); return false;
        }
        const payload = { fornecedor_id, etapa, largura, preco_por_metro, atualizado_em: new Date().toISOString() };
        const { error } = isEdit
          ? await supa.from('precos_terceirizada').update(payload).eq('id', preco.id)
          : await supa.from('precos_terceirizada').insert(payload);
        if (error) { toast(error.message.includes('duplicate') ? 'Já existe preço pra esse fornecedor + etapa + largura' : 'Erro ao salvar', 'error'); console.error(error); return false; }
        toast(isEdit ? 'Preço atualizado' : 'Preço criado', 'success');
        reload();
      }
    });
  }

  function confirmExcluir(preco) {
    confirmDialog({
      title: 'Excluir preço',
      message: `Excluir esse preço (${preco.fornecedor?.nome}, ${preco.etapa}, ${preco.largura}m)?`,
      confirmLabel: 'Excluir',
      onConfirm: async () => {
        const { error } = await supa.from('precos_terceirizada').delete().eq('id', preco.id);
        if (error) { toast('Erro ao excluir', 'error'); console.error(error); return; }
        toast('Preço excluído', 'success');
        reload();
      }
    });
  }

  await reload();
  return shellLayout(ADMIN_MENU, container);
}

async function screenCadastrosUsuarios() {
  const container = el('div', {});

  async function reload() {
    const [usersRes, fornsRes] = await Promise.all([
      supa.from('usuarios').select('id, email, nome, tipo, fornecedor:fornecedor_id(id, nome, tipo)').order('email'),
      supa.from('fornecedores').select('id, nome, tipo').order('nome')
    ]);
    if (usersRes.error || fornsRes.error) { toast('Erro ao carregar', 'error'); console.error(usersRes.error || fornsRes.error); return; }
    render(usersRes.data || [], fornsRes.data || []);
  }

  function render(users, forns) {
    container.replaceChildren(
      pageHeader('Usuários', [{ label: '+ Vincular usuário', onclick: () => openModal(null, forns) }]),
      el('div', { class: 'bg-yellow-50 border border-yellow-200 rounded-lg p-4 mb-4 text-sm text-yellow-900' },
        el('p', { class: 'font-semibold mb-1' }, 'Como criar um usuário novo:'),
        el('ol', { class: 'list-decimal pl-5 space-y-1' },
          el('li', {}, 'Abra o Supabase Studio → Authentication → Users → Add user → Create new user (marque Auto Confirm User).'),
          el('li', {}, 'Copie o UID gerado.'),
          el('li', {}, 'Volte aqui, clique "+ Vincular usuário" e cole o UID + dados.')
        )
      ),
      dataTable({
        columns: [
          { key: 'email', label: 'E-mail' },
          { key: 'nome', label: 'Nome' },
          { key: 'tipo', label: 'Tipo' },
          { key: 'fornecedor', label: 'Fornecedor', render: (r) => r.fornecedor?.nome || '—' },
        ],
        rows: users,
        actions: [
          { label: 'Editar', onclick: (r) => openModal(r, forns) },
          { label: 'Excluir vínculo', class: 'text-red-600 hover:underline', onclick: (r) => confirmExcluir(r) },
        ]
      })
    );
  }

  function openModal(usr, forns) {
    const isEdit = !!usr;
    const fornOptions = forns.map(f => ({ value: f.id, label: `${f.nome} (${labelFornecedorTipo(f.tipo)})` }));
    const tipoOptions = [{ value: 'admin', label: 'Admin' }, { value: 'fornecedor', label: 'Fornecedor' }];

    const idInput = textInput({ value: usr?.id || '', placeholder: 'xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx' });
    idInput.disabled = isEdit;
    if (isEdit) idInput.classList.add('bg-gray-100');

    const emailInput = textInput({ type: 'email', value: usr?.email || '', placeholder: 'usuario@exemplo.com' });
    const nomeInput = textInput({ value: usr?.nome || '', placeholder: 'Ex: Fornecedor X' });
    const tipoSel = selectInput({ options: tipoOptions, value: usr?.tipo });
    const fornSel = selectInput({ options: fornOptions, value: usr?.fornecedor?.id, placeholder: '(nenhum)' });

    const body = el('div', {},
      formField({ label: 'UID do Auth', input: idInput, hint: isEdit ? 'Não pode ser alterado' : 'Cole o UID copiado do Supabase Studio' }),
      formField({ label: 'E-mail', input: emailInput, hint: 'Deve bater com o e-mail criado no Supabase Auth' }),
      formField({ label: 'Nome', input: nomeInput }),
      formField({ label: 'Tipo', input: tipoSel }),
      formField({ label: 'Fornecedor (se tipo for "fornecedor")', input: fornSel, hint: 'Deixe vazio se for admin' })
    );

    modal({
      title: isEdit ? 'Editar usuário' : 'Vincular usuário',
      body,
      onSave: async () => {
        const id = idInput.value.trim();
        const email = emailInput.value.trim();
        const nome = nomeInput.value.trim();
        const tipo = tipoSel.value;
        const fornecedor_id = fornSel.value || null;
        if (!id || !email || !nome || !tipo) { toast('Preencha UID, email, nome e tipo', 'error'); return false; }
        if (tipo === 'fornecedor' && !fornecedor_id) { toast('Usuário tipo "fornecedor" precisa de fornecedor vinculado', 'error'); return false; }
        const payload = { id, email, nome, tipo, fornecedor_id };
        const { error } = isEdit
          ? await supa.from('usuarios').update({ email, nome, tipo, fornecedor_id }).eq('id', usr.id)
          : await supa.from('usuarios').insert(payload);
        if (error) {
          let msg = 'Erro ao salvar';
          if (error.message.includes('duplicate')) msg = 'UID ou e-mail já cadastrado';
          if (error.message.includes('foreign key')) msg = 'UID não existe no Supabase Auth — crie lá primeiro';
          toast(msg, 'error'); console.error(error); return false;
        }
        toast(isEdit ? 'Usuário atualizado' : 'Usuário vinculado', 'success');
        reload();
      }
    });
  }

  function confirmExcluir(usr) {
    confirmDialog({
      title: 'Excluir vínculo',
      message: `Remover "${usr.email}" da tabela de usuários? O cadastro no Supabase Auth NÃO será removido (precisa fazer manual no Studio).`,
      confirmLabel: 'Remover',
      onConfirm: async () => {
        const { error } = await supa.from('usuarios').delete().eq('id', usr.id);
        if (error) { toast('Erro ao remover', 'error'); console.error(error); return; }
        toast('Vínculo removido', 'success');
        reload();
      }
    });
  }

  await reload();
  return shellLayout(ADMIN_MENU, container);
}

  window.addEventListener('hashchange', handleRoute);

  await loadCurrentUser();
  if (!CURRENT_USER) {
    navigate('#/login');
  } else {
    if (location.hash && location.hash !== '#/login') handleRoute();
    else routeAfterLogin();
  }
}

main().catch(err => {
  console.error(err);
  toast('Erro ao iniciar o app', 'error');
});
